name: release

# Runs when a version tag is pushed, e.g. `git tag v0.2.0-alpha.2 && git push
# origin v0.2.0-alpha.2`. Produces prebuilt binaries, uploads them to the
# matching GitHub Release (creating one if it doesn't exist), and publishes
# every public crate to crates.io in the correct topological order.
#
# Required repository secrets:
#   CRATES_IO_TOKEN  scoped to publish-new + publish-update
# GITHUB_TOKEN is provided automatically.

on:
  push:
    tags:
      - "v*"
  # Allow dry runs from the Actions UI. A manual run will skip the actual
  # `cargo publish --dry-run` is used instead.
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Skip uploads / cargo publish. Useful for pipeline debugging."
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ---------------------------------------------------------------------------
  # 1. Build a prebuilt tarball per target and publish to the GH release
  # ---------------------------------------------------------------------------
  build-release-binary:
    name: build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          # Opt-in additional targets later by adding rows here. Cross-arch
          # Linux (aarch64) will need `cross` and is deferred.
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Build spdf-cli
        run: cargo build --release -p spdf-cli --target ${{ matrix.target }}

      - name: Package tarball
        shell: bash
        run: |
          set -euo pipefail
          VER="${GITHUB_REF_NAME#v}"
          DIR="spdf-${VER}-${{ matrix.target }}"
          mkdir -p "dist/${DIR}"
          cp "target/${{ matrix.target }}/release/spdf" "dist/${DIR}/"
          cp LICENSE README.md CHANGELOG.md "dist/${DIR}/"
          tar czf "dist/${DIR}.tar.gz" -C dist "${DIR}"
          sha256sum "dist/${DIR}.tar.gz" > "dist/${DIR}.tar.gz.sha256"
          echo "TARBALL=dist/${DIR}.tar.gz" >> "$GITHUB_ENV"
          echo "CHECKSUM=dist/${DIR}.tar.gz.sha256" >> "$GITHUB_ENV"

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') && inputs.dry_run != 'true'
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          files: |
            ${{ env.TARBALL }}
            ${{ env.CHECKSUM }}
          # If the release doesn't exist yet, this creates it with an
          # auto-generated body. Manually-authored release notes already on
          # GitHub are preserved because `append_body: false` (the default)
          # only replaces the body if we pass `body`, which we don't.

  # ---------------------------------------------------------------------------
  # 2. Publish every crate to crates.io in topological order
  # ---------------------------------------------------------------------------
  publish-crates:
    name: cargo publish
    runs-on: ubuntu-latest
    needs: build-release-binary
    # Only run on real tag pushes. workflow_dispatch stays at dry-run because
    # crates.io forbids re-publishing the same version.
    if: startsWith(github.ref, 'refs/tags/v') && inputs.dry_run != 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Verify tag matches workspace version
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          WORKSPACE_VER=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [[ "$TAG" != "$WORKSPACE_VER" ]]; then
            echo "::error::tag v$TAG does not match workspace version $WORKSPACE_VER"
            exit 1
          fi

      # Topological publish. Each crate waits up to ~10 minutes between retries
      # to ride out the new-crate rate limit (1 per 10 min) for first-time
      # publishes. Existing-crate updates return 200 immediately.
      - name: Publish crates in order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          set -euo pipefail
          CRATES=(
            spdf-types
            spdf-processing
            spdf-projection
            spdf-pdf
            spdf-ocr
            spdf-convert
            spdf-output
            spdf-core
            spdf-cli
          )
          for crate in "${CRATES[@]}"; do
            echo "::group::publish $crate"
            for attempt in 1 2 3 4; do
              if cargo publish -p "$crate" --no-verify; then
                echo "$crate: published"
                break
              fi
              if [[ $attempt -eq 4 ]]; then
                echo "::error::$crate: failed after 4 attempts"
                exit 1
              fi
              wait=$((60 * attempt * 3))  # 3, 6, 9 minutes
              echo "$crate: attempt $attempt failed; sleeping ${wait}s"
              sleep "$wait"
            done
            echo "::endgroup::"
          done

  # ---------------------------------------------------------------------------
  # 3. Dry-run sanity check on manual workflow_dispatch
  # ---------------------------------------------------------------------------
  dry-run-check:
    name: cargo publish --dry-run
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Dry-run publish of every crate
        run: |
          for crate in spdf-types spdf-processing spdf-projection spdf-pdf \
                       spdf-ocr spdf-convert spdf-output spdf-core spdf-cli; do
            echo "::group::dry-run $crate"
            cargo publish -p "$crate" --dry-run --allow-dirty
            echo "::endgroup::"
          done
